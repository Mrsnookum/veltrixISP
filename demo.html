<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix Live Experience | ISP Billing Demo</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #020617; }
        iframe { width: 100%; height: calc(100vh - 60px); border: none; transition: opacity 0.5s ease; }
        .demo-bar { height: 60px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 50; }
        .glass-modal { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); animation: modalIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        /* Tab Switcher Styles */
        .tab-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-btn.active { background: #2563eb; color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
    </style>
</head>
<body>

    <div class="demo-bar flex items-center justify-between px-6">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-3">
                <img src="favicon.png" class="w-6 h-6">
                <span class="text-white font-black uppercase tracking-tighter italic hidden sm:block">Veltrix Demo Mode</span>
            </div>
            
            <div class="flex bg-white/5 p-1 rounded-xl border border-white/10">
                <button onclick="switchView('portal', this)" class="tab-btn active px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest border border-transparent">
                    <i class="fas fa-wifi mr-2"></i> Client Portal
                </button>
                <button onclick="switchView('admin', this)" class="tab-btn px-4 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-widest border border-transparent">
                    <i class="fas fa-user-shield mr-2"></i> Partner Admin
                </button>
            </div>
        </div>

        <div class="flex gap-4">
            <span class="hidden md:block text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full font-bold uppercase border border-blue-500/30">Sandbox Environment</span>
            <a href="index.html" class="text-slate-400 hover:text-white text-xs font-bold transition-all flex items-center">
                <i class="fas fa-times mr-2"></i> Exit Demo
            </a>
        </div>
    </div>

    <iframe id="demoFrame" src="https://mrsnookum.github.io/Single_Billing-system/" allow="payment"></iframe>

    <div id="successModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 p-4">
        <div class="glass-modal w-full max-w-md rounded-[2.5rem] p-10 text-center shadow-2xl border-blue-500/20">
            <div class="w-20 h-20 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl border border-emerald-500/30">
                <i class="fas fa-check-double"></i>
            </div>
            <h2 class="text-2xl font-black text-white uppercase tracking-tight mb-2">Payment Verified!</h2>
            <p class="text-slate-400 text-sm mb-8 leading-relaxed">The Veltrix billing bridge has confirmed your demo payment. In a live environment, the access code would now be active on the router.</p>
            
            <div class="space-y-3">
                <button onclick="window.location.reload()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold transition-all uppercase text-[10px] tracking-widest">
                    Try Another Test
                </button>
                <button onclick="switchView('admin')" class="block w-full py-4 bg-white/5 hover:bg-white/10 text-white rounded-2xl font-bold transition-all uppercase text-[10px] tracking-widest border border-white/5">
                    Explore Admin Dashboard
                </button>
            </div>
        </div>
    </div>

    <script>
    const demoFrame = document.getElementById('demoFrame');
    const successModal = document.getElementById('successModal');
    let loadCount = 0; 
    let currentView = 'portal';

    function switchView(view, btn) {
        currentView = view;
        loadCount = 0; // Reset load count for the new page
        
        // Update Buttons
        if(btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // Switch Source
        demoFrame.style.opacity = '0';
        setTimeout(() => {
            demoFrame.src = (view === 'admin') 
                ? "https://mrsnookum.github.io/Single_Billing-system/admin.html" 
                : "https://mrsnookum.github.io/Single_Billing-system/";
            demoFrame.style.opacity = '1';
            successModal.classList.add('hidden');
            demoFrame.style.display = 'block';
        }, 300);
    }

    demoFrame.onload = function() {
        // We only track payment success on the portal page
        if(currentView !== 'portal') return;

        loadCount++;
        if (loadCount === 1) return; 

        try {
            const currentPath = demoFrame.contentWindow.location.href;
            console.log("Still in app...");
        } catch (e) {
            handlePaymentSuccess();
        }
    };

    function handlePaymentSuccess() {
        demoFrame.style.display = 'none';
        successModal.classList.remove('hidden');
        successModal.classList.add('flex');
    }
</script>
</body>
</html>
