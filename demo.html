<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veltrix Live Experience | ISP Billing Demo</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #020617; }
        iframe { width: 100%; height: calc(100vh - 60px); border: none; transition: opacity 0.5s ease; }
        .demo-bar { height: 60px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; z-index: 50; }
        .glass-modal { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); animation: modalIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="demo-bar flex items-center justify-between px-6">
        <div class="flex items-center gap-3">
            <img src="favicon.png" class="w-6 h-6">
            <span class="text-white font-black uppercase tracking-tighter italic">Veltrix Demo Mode</span>
        </div>
        <div class="flex gap-4">
            <span class="text-[10px] bg-blue-600/20 text-blue-400 px-3 py-1 rounded-full font-bold uppercase border border-blue-500/30">Sandbox Environment</span>
            <a href="index.html" class="text-slate-400 hover:text-white text-xs font-bold transition-all">
                <i class="fas fa-times mr-1"></i> Exit Demo
            </a>
        </div>
    </div>

    <iframe id="demoFrame" src="https://mrsnookum.github.io/Single_Billing-system/" allow="payment"></iframe>

    <div id="successModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/80 p-4">
        <div class="glass-modal w-full max-w-md rounded-[2.5rem] p-10 text-center shadow-2xl border-blue-500/20">
            <div class="w-20 h-20 bg-emerald-500/20 text-emerald-400 rounded-full flex items-center justify-center mx-auto mb-6 text-3xl border border-emerald-500/30">
                <i class="fas fa-check-double"></i>
            </div>
            <h2 class="text-2xl font-black text-white uppercase tracking-tight mb-2">Payment Verified!</h2>
            <p class="text-slate-400 text-sm mb-8 leading-relaxed">The Veltrix billing bridge has confirmed your demo payment. In a live environment, the access code would now be active on the router.</p>
            
            <div class="space-y-3">
                <button onclick="window.location.reload()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-bold transition-all uppercase text-[10px] tracking-widest">
                    Try Another Test
                </button>
                <a href="index.html" class="block w-full py-4 bg-white/5 hover:bg-white/10 text-white rounded-2xl font-bold transition-all uppercase text-[10px] tracking-widest border border-white/5">
                    Return to Home
                </a>
            </div>
        </div>
    </div>

    <script>
    const demoFrame = document.getElementById('demoFrame');
    const successModal = document.getElementById('successModal');
    let loadCount = 0; // Track how many times the iframe has loaded

    demoFrame.onload = function() {
        loadCount++;

        // On the very first load, we do nothing except let the user see the billing system
        if (loadCount === 1) {
            console.log("Billing System Loaded - Waiting for payment...");
            return; 
        }

        // On any subsequent load (like a redirect after payment), check for the Google error
        try {
            // This will fail if it's redirecting to Google
            const currentPath = demoFrame.contentWindow.location.href;
            
            // Optional: If the billing system just refreshes itself, we stay in demo mode
            console.log("Still in app...");
        } catch (e) {
            // SECURITY ERROR CAUGHT: This only happens when redirecting to Google
            handlePaymentSuccess();
        }
    };

    function handlePaymentSuccess() {
        // Remove the iframe entirely so the Google error never flashes
        demoFrame.style.display = 'none';

        // Show the Veltrix popup
        successModal.classList.remove('hidden');
        successModal.classList.add('flex');
    }
</script>
</body>
</html>
